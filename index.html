<!DOCTYPE html>
<html lang="pt-BR">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Cruz Dental — Cadastro Evento</title>
<style>
  * { box-sizing: border-box; margin: 0; padding: 0; }
  body { background: #f0f2f5; font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', sans-serif; min-height: 100vh; display: flex; align-items: center; justify-content: center; padding: 1.5rem; }
  .card { background: #fff; border-radius: 16px; overflow: hidden; width: 100%; max-width: 420px; box-shadow: 0 4px 24px rgba(0,0,0,0.10); }
  .header { background: #fff; padding: 1.5rem 1.5rem 1rem; text-align: center; border-bottom: 1px solid #eee; }
  .header img { width: 170px; height: auto; display: block; margin: 0 auto 8px; }
  .header .sub { font-size: 13px; color: #666; }
  .body { padding: 1.25rem 1.5rem; display: flex; flex-direction: column; gap: 14px; }
  .prize { background: #E1F5EE; border: 1px solid #5DCAA5; border-radius: 10px; padding: 10px 14px; display: flex; align-items: center; gap: 10px; font-size: 13px; color: #085041; line-height: 1.4; }
  .prize-icon { font-size: 22px; flex-shrink: 0; }
  .divider { border: none; border-top: 1px solid #eee; margin: 2px 0; }
  label { display: block; font-size: 12px; font-weight: 600; color: #555; margin-bottom: 5px; }
  input { width: 100%; padding: 11px 13px; border: 1.5px solid #ddd; border-radius: 8px; font-size: 15px; color: #222; background: #fafafa; outline: none; transition: border-color 0.2s, box-shadow 0.2s; }
  input:focus { border-color: #1D9E75; box-shadow: 0 0 0 3px #9FE1CB55; background: #fff; }
  .btn { width: 100%; padding: 14px; background: #534AB7; color: #fff; border: none; border-radius: 10px; font-size: 16px; font-weight: 600; cursor: pointer; letter-spacing: 0.3px; transition: background 0.2s; }
  .btn:hover { background: #3C3489; }
  .btn:disabled { background: #aaa; cursor: not-allowed; }
  .footer { padding: 0 1.5rem 1.25rem; }
  .error { color: #c0392b; font-size: 12px; margin-top: 4px; display: none; }
  /* Tela de sucesso */
  .success { display: none; padding: 2.5rem 1.5rem; text-align: center; flex-direction: column; align-items: center; gap: 12px; }
  .success-circle { width: 64px; height: 64px; border-radius: 50%; background: #E1F5EE; display: flex; align-items: center; justify-content: center; margin: 0 auto; }
  .success-circle svg { width: 32px; height: 32px; }
  .success h2 { font-size: 20px; font-weight: 700; color: #1a1a1a; }
  .success p { font-size: 14px; color: #555; line-height: 1.6; }
  .success img { width: 130px; height: auto; margin-top: 8px; }
</style>
</head>

<script>
const SHEET_URL = "https://script.google.com/macros/s/AKfycbx-cleckQMxHmhIqGDDZ3gbiP-ydQ0CsNAEuWOA_vOpzsWTv3m79Xve-JDZnT3jP19d/exec";

async function enviar() {
  const nome = document.getElementById('nome').value.trim();
  const empresa = document.getElementById('empresa').value.trim();
  const cargo = document.getElementById('cargo').value.trim();
  const whats = document.getElementById('whats').value.trim();
  const erro = document.getElementById('msg-erro');
  const btn = document.getElementById('btn-enviar');

  if (!nome || !empresa || !cargo || !whats) {
    erro.style.display = 'block';
    return;
  }
  erro.style.display = 'none';
  btn.disabled = true;
  btn.textContent = 'Enviando...';

  try {
    await fetch(SHEET_URL, {
      method: 'POST',
      mode: 'no-cors',
      headers: { 'Content-Type': 'application/json' },
      body: JSON.stringify({ nome, empresa, cargo, whatsapp: whats })
    });
  } catch(e) {}

  document.getElementById('form-view').style.display = 'none';
  const s = document.getElementById('success-view');
  s.style.display = 'flex';
}
</script>
